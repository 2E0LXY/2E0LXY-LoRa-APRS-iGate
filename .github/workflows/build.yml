name: Build dual-board release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - environment: heltec_wifi_lora_32_V3_2
            chip: esp32s3
            flash_size: 8MB
            boot_offset: "0x0000"
            asset: 2E0LXY-Heltec-V3.2
          - environment: ttgo-lora32-v21
            chip: esp32
            flash_size: 4MB
            boot_offset: "0x1000"
            asset: 2E0LXY-LilyGO-LoRa32-V2.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware and filesystem
        run: |
          pio run -e "${{ matrix.target.environment }}"
          pio run -e "${{ matrix.target.environment }}" --target buildfs

      - name: Create board-specific release images
        shell: bash
        run: |
          set -euo pipefail
          BUILD=".pio/build/${{ matrix.target.environment }}"
          FRAMEWORK="$HOME/.platformio/packages/framework-arduinoespressif32"
          ESPTOOL="$HOME/.platformio/packages/tool-esptoolpy/esptool.py"
          cp "$BUILD/firmware.bin" "${{ matrix.target.asset }}-firmware.bin"
          python "$ESPTOOL" --chip "${{ matrix.target.chip }}" merge_bin \
            -o "${{ matrix.target.asset }}-full-flash.bin" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size "${{ matrix.target.flash_size }}" \
            "${{ matrix.target.boot_offset }}" "$BUILD/bootloader.bin" \
            0x8000 "$BUILD/partitions.bin" \
            0xe000 "$FRAMEWORK/tools/partitions/boot_app0.bin" \
            0x10000 "$BUILD/firmware.bin" \
            0x3D0000 "$BUILD/spiffs.bin"
          sha256sum "${{ matrix.target.asset }}-firmware.bin" \
            "${{ matrix.target.asset }}-full-flash.bin"

      - name: Attach images to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ matrix.target.asset }}-firmware.bin" \
            "${{ matrix.target.asset }}-full-flash.bin" \
            --repo "${{ github.repository }}" --clobber
